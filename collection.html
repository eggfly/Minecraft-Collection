function renderCards() {
  const grid = document.getElementById("cardGrid");
  grid.innerHTML = "";
  sets.forEach(s => {
    const cardClass = s.owned === false ? "not-owned" : (s.retired ? "retired" : "owned");
    const assemblyStatus = getAssemblyStatus(s);

    let ribbonHTML = "";
    if (s.retired && s.owned !== false) ribbonHTML = '<div class="ribbon">绝版</div>';

    let badgesHTML = `<span class="badge badge-year">${s.year}年</span>`;
    if (s.pieces > 0) badgesHTML += `<span class="badge badge-pieces">${s.pieces}颗粒</span>`;
    if (s.retired) badgesHTML += `<span class="badge badge-retired">绝版</span>`;
    else badgesHTML += `<span class="badge badge-available">在售</span>`;

    if (s.owned === true) {
      if (s.assembled === true) badgesHTML += `<span class="badge badge-assembled">已拼好</span>`;
      else if (s.assembled === false) badgesHTML += `<span class="badge badge-not-assembled">可能未拼</span>`;
      else badgesHTML += `<span class="badge badge-unknown">拼装状态未知</span>`;
    } else if (s.owned === false) {
      if (s.note) badgesHTML += `<span class="badge badge-not-owned">${s.note}</span>`;
      else badgesHTML += `<span class="badge badge-not-owned">未购入</span>`;
    } else {
      if (s.note) badgesHTML += `<span class="badge badge-unknown">${s.note}</span>`;
    }

    let priceHTML = `<div class="price-row"><span class="price-original">¥${s.priceCNY}</span></div>`;
    if (s.retired && s.resaleLow) {
      const avgResale = Math.round((s.resaleLow + s.resaleHigh) / 2);
      const multiplier = (avgResale / s.priceCNY).toFixed(1);
      priceHTML += `<div class="price-resale">二手估价: <span class="premium">¥${s.resaleLow}~${s.resaleHigh}</span> (约${multiplier}倍)</div>`;
    }

    const card = document.createElement("div");
    card.className = `card ${cardClass}`;
    card.dataset.owned = s.owned === true ? "yes" : (s.owned === false ? "no" : "unknown");
    card.dataset.retired = s.retired ? "yes" : "no";
    card.dataset.assembled = s.assembled === true ? "yes" : (s.assembled === false ? "no" : "unknown");
    card.innerHTML = `
      ${ribbonHTML}
      <img class="card-img" src="images/${s.id}.jpg" alt="${s.id} ${s.name}" loading="lazy" onerror="this.style.background='#333';this.alt='图片未找到';">
      <div class="card-body">
        <div class="card-set-id">#${s.id}</div>
        <div class="card-title">${s.name} <span style="color:#888;font-weight:normal;font-size:0.85em">${s.nameEn}</span></div>
        <div class="card-meta">${badgesHTML}</div>
        ${priceHTML}
      </div>
    `;
    grid.appendChild(card);
  });
}

function getAssemblyStatus(s) {
  if (s.assembled === true) return "assembled";
  if (s.assembled === false) return "not-built";
  return "unknown";
}

function filterCards(type) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");

  document.querySelectorAll(".card").forEach(card => {
    let show = false;
    switch(type) {
      case "all": show = true; break;
      case "owned": show = card.dataset.owned === "yes"; break;
      case "retired": show = card.dataset.retired === "yes"; break;
      case "not-built":
        show = card.dataset.owned === "yes" && card.dataset.assembled !== "yes"; break;
      case "not-owned": show = card.dataset.owned === "no"; break;
    }
    card.style.display = show ? "" : "none";
  });
}

function renderResaleTable() {
  const tbody = document.querySelector("#resaleTable tbody");
  const retiredSets = sets.filter(s => s.retired && s.resaleLow);
  retiredSets.forEach(s => {
    const avgResale = Math.round((s.resaleLow + s.resaleHigh) / 2);
    const multiplier = (avgResale / s.priceCNY).toFixed(1);
    const ownedText = s.owned === true ? "有" : (s.owned === false ? "无" : "未知");
    const ownedColor = s.owned === true ? "#7ec850" : (s.owned === false ? "#ff6b6b" : "#888");
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${s.id}</td>
      <td>${s.name}</td>
      <td>${s.year}</td>
      <td class="price-cell">¥${s.priceCNY}</td>
      <td class="resale-cell">¥${s.resaleLow}~${s.resaleHigh}</td>
      <td><span class="premium">${multiplier}x</span></td>
      <td style="color:${ownedColor};font-weight:bold">${ownedText}</td>
    `;
    tbody.appendChild(tr);
  });
}

function updateStats() {
  const owned = sets.filter(s => s.owned === true);
  const retired = sets.filter(s => s.retired && s.owned === true);
  const notBuilt = sets.filter(s => s.owned === true && s.assembled !== true);
  const notOwned = sets.filter(s => s.owned === false);
  const totalOriginal = owned.reduce((sum, s) => sum + s.priceCNY, 0);

  document.getElementById("totalOwned").textContent = owned.length;
  document.getElementById("totalRetired").textContent = retired.length;
  document.getElementById("totalNotBuilt").textContent = notBuilt.length;
  document.getElementById("totalNotOwned").textContent = notOwned.length;
  document.getElementById("totalValue").textContent = "¥" + totalOriginal.toLocaleString();

  const retiredOwned = sets.filter(s => s.retired && s.owned === true && s.resaleLow);
  const totalResaleLow = retiredOwned.reduce((sum, s) => sum + s.resaleLow, 0);
  const totalResaleHigh = retiredOwned.reduce((sum, s) => sum + s.resaleHigh, 0);
  const totalRetiredOriginal = retiredOwned.reduce((sum, s) => sum + s.priceCNY, 0);

  document.getElementById("totalValueSection").innerHTML = `
    <div>已拥有套装原价总值: <span class="amount">¥${totalOriginal.toLocaleString()}</span></div>
    <div style="margin-top:10px;">其中绝版套装 (${retiredOwned.length}套) 原价: <span style="color:#ff4757;font-weight:bold;">¥${totalRetiredOriginal.toLocaleString()}</span></div>
    <div style="margin-top:5px;">绝版套装估计二手总值: <span style="color:#ffa502;font-weight:bold;font-size:1.3em;">¥${totalResaleLow.toLocaleString()} ~ ¥${totalResaleHigh.toLocaleString()}</span></div>
    <div style="margin-top:5px;color:#888;font-size:0.85em;">平均增值约 ${(((totalResaleLow+totalResaleHigh)/2) / totalRetiredOriginal).toFixed(1)} 倍</div>
  `;
}

renderCards();
renderResaleTable();
updateStats();
</script>

</body>
</html>
